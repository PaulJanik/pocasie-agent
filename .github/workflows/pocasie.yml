name: Ranné počasie

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  posli-pocasie:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests anthropic
      - run: python weather.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
